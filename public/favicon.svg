<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#1e3a8a" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0" />
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100" height="100" fill="#0a0a0a" rx="20"/>
  <circle cx="50" cy="50" r="40" fill="url(#glow)"/>
  
  <!-- Outer Eye Ring -->
  <path d="M 15 50 C 35 20, 65 20, 85 50 C 65 80, 35 80, 15 50 Z" 
        fill="none" 
        stroke="#2d3748" 
        stroke-width="3"/>
        
  <!-- Glowing Eye Core -->
  <path d="M 25 50 C 40 30, 60 30, 75 50 C 60 70, 40 70, 25 50 Z" 
        fill="#1e3a8a" 
        stroke="#e0e6ed" 
        stroke-width="2"
        filter="url(#neon)"/>
        
  <!-- Pupil -->
  <circle cx="50" cy="50" r="10" fill="#e0e6ed" filter="url(#neon)"/>
</svg>
